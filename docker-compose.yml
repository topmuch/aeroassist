version: '3.8'

services:
  # ==================== POSTGRESQL + PGVECTOR ====================
  postgres:
    image: pgvector/pgvector:pg16-alpine
    container_name: aeroassist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeroassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePass123!}
      POSTGRES_DB: ${POSTGRES_DB:-aeroassist_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeroassist} -d ${POSTGRES_DB:-aeroassist_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aeroassist_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: aeroassist_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisSecurePass456!} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisSecurePass456!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aeroassist_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ==================== OPENBSP / WAKIT-API ====================
  openbsp:
    image: whiskeyhuntercom/openbsp:latest
    container_name: aeroassist_openbsp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      WEBHOOK_URL: ${APP_URL:-http://localhost:3000}/api/webhook/openbsp
      WEBHOOK_SECRET: ${OPENBSP_WEBHOOK_SECRET:-change_this_secret}
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisSecurePass456!}@redis:6379
      WHATSAPP_API_VERSION: v17.0
      WHATSAPP_ACCESS_TOKEN: ${OPENBSP_WHATSAPP_ACCESS_TOKEN:-}
      LOG_LEVEL: info
      LOG_FORMAT: json
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW: 60
    volumes:
      - openbsp_sessions:/app/sessions
      - ./docker/openbsp/config.json:/app/config.json:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aeroassist_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ==================== AEROASSIST BACKEND (Next.js) ====================
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: aeroassist_backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aeroassist}:${POSTGRES_PASSWORD:-SecurePass123!}@postgres:5432/${POSTGRES_DB:-aeroassist_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisSecurePass456!}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-RedisSecurePass456!}
      OPENBSP_API_URL: http://openbsp:3001
      OPENBSP_WEBHOOK_SECRET: ${OPENBSP_WEBHOOK_SECRET:-change_this_secret}
      OPENBSP_PHONE_NUMBER_ID: ${OPENBSP_PHONE_NUMBER_ID:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.3}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-2048}
      JWT_SECRET: ${JWT_SECRET:-jwt_change_me_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://aeroassist.yourdomain.com}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change_me_in_production}
      SEED_SECRET: ${SEED_SECRET:-change_me_in_production}
      NEXT_PUBLIC_ADMIN_PIN: ${NEXT_PUBLIC_ADMIN_PIN:-1234}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-52428800}
      UPLOAD_DESTINATION: ${UPLOAD_DESTINATION:-/app/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/combined.log
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-aeroassist_verify_2024}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v17.0}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbsp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aeroassist_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: aeroassist_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - aeroassist_network
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== PGADMIN (DEV ONLY) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aeroassist_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aeroassist.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-AdminPass123!}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - dev
    depends_on:
      - postgres
    networks:
      - aeroassist_network

  # ==================== REDIS INSIGHT (DEV ONLY) ====================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: aeroassist_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    profiles:
      - dev
    depends_on:
      - redis
    networks:
      - aeroassist_network

# ==================== VOLUMES ====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  openbsp_sessions:
    driver: local
  pgadmin_data:
    driver: local
  redis_insight_data:
    driver: local

# ==================== NETWORKS ====================
networks:
  aeroassist_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
