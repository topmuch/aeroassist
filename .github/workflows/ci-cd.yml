# =============================================================================
# AeroAssist CI/CD Pipeline
# =============================================================================
# Badges (add to README.md):
#   [![CI/CD](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg)](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml)
#   [![Lint](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg?branch=main&label=lint)]()
#   [![Type Check](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg?branch=main&label=typecheck)]()
#   [![Build](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg?branch=main&label=build)]()
#   [![API Tests](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg?branch=main&label=api-tests)]()
#   [![Docker](https://github.com/<owner>/aeroassist/actions/workflows/ci-cd.yml/badge.svg?branch=main&label=docker)]()
# =============================================================================

name: AeroAssist CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Global timeout: 30 minutes
env:
  NODE_ENV: test
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  # ── 2. Type Check (matrix: Node 20 & 22) ─────────────────────────────────
  typecheck:
    name: Type Check (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        run: bun run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./db/custom.db' }}

      - name: Build Next.js application
        run: bun run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./db/custom.db' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ── 4. API Smoke Tests ────────────────────────────────────────────────────
  # Uses SQLite (same as build) to avoid Prisma client mismatch with standalone output.
  # PostgreSQL-specific features are tested in separate integration jobs.
  api-tests:
    name: API Smoke Tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Push database schema (SQLite)
        run: bun run db:push
        env:
          DATABASE_URL: "file:./db/custom.db"

      - name: Start production server
        run: |
          bun run start &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
        env:
          DATABASE_URL: "file:./db/custom.db"
          NEXTAUTH_SECRET: test-secret-for-ci
          ADMIN_API_KEY: ci-test-api-key

      - name: Run API smoke tests
        run: |
          set -euo pipefail
          BASE_URL="http://localhost:3000"
          AUTH_HEADER="Authorization: Bearer ci-test-api-key"
          PASS=0
          FAIL=0

          run_test() {
            local name="$1"
            local method="$2"
            local url="$3"
            local expected_status="$4"
            local extra_headers="${5:-}"
            local body="${6:-}"

            echo -n "  $name ... "
            if [ "$method" = "POST" ] && [ -n "$body" ]; then
              response=$(curl -s -o /tmp/test_response.json -w "%{http_code}" \
                -X POST "$BASE_URL$url" \
                -H "Content-Type: application/json" \
                ${extra_headers:+-H "$extra_headers"} \
                -d "$body" \
                --max-time 10)
            else
              response=$(curl -s -o /tmp/test_response.json -w "%{http_code}" \
                -X "$method" "$BASE_URL$url" \
                ${extra_headers:+-H "$extra_headers"} \
                --max-time 10)
            fi

            if [ "$response" = "$expected_status" ]; then
              echo "PASS ($response)"
              PASS=$((PASS + 1))
            else
              echo "FAIL (expected $expected_status, got $response)"
              echo "    Response: $(cat /tmp/test_response.json 2>/dev/null | head -c 200)"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "============================================"
          echo "  AeroAssist API Smoke Tests"
          echo "============================================"

          # Health check
          run_test "GET /api/health" GET "/api/health" "200"

          # Chat endpoint (no conversationId — creates new conversation)
          run_test "POST /api/chat" POST "/api/chat" "200" "" \
            '{"message":"Hello, what services do you offer?"}'

          # RAG search
          run_test "POST /api/rag/test" POST "/api/rag/test" "200" "$AUTH_HEADER" \
            '{"query":"flight delay policy","maxResults":3}'

          # Embedding test
          run_test "GET /api/rag/embedding-test" GET "/api/rag/embedding-test?text=hello" "200" "$AUTH_HEADER"

          # Flights API
          run_test "GET /api/flights" GET "/api/flights" "200" "$AUTH_HEADER"

          # Knowledge base
          run_test "GET /api/knowledge" GET "/api/knowledge" "200" "$AUTH_HEADER"

          # Analytics
          run_test "GET /api/analytics" GET "/api/analytics" "200" "$AUTH_HEADER"

          # Users
          run_test "GET /api/users" GET "/api/users" "200" "$AUTH_HEADER"

          # Modules
          run_test "GET /api/modules" GET "/api/modules" "200" "$AUTH_HEADER"

          echo "============================================"
          echo "  Results: $PASS passed, $FAIL failed"
          echo "============================================"

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL API smoke test(s) failed"
            exit 1
          fi

      - name: Stop production server
        if: always()
        run: pkill -f "next start" || true

  # ── 5. Docker Build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    needs: [build, api-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  # ── 6. Deploy (placeholder) ────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.ref_name }})
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://aeroassist.app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "============================================"
          echo "  Deploy to Production"
          echo "============================================"
          echo "Branch:   ${{ github.ref_name }}"
          echo "Commit:   ${{ github.sha }}"
          echo "Actor:    ${{ github.actor }}"
          echo "Image:    ghcr.io/${{ github.repository }}:latest"
          echo "============================================"
          echo ""
          echo "Deployment would happen here. Configure one of:"
          echo "  - AWS ECS / Fargate"
          echo "  - Google Cloud Run"
          echo "  - Railway / Vercel"
          echo "  - Self-hosted with docker-compose"
          echo ""
          echo "Set up your deployment provider in this job."

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://aeroassist.app',
              description: 'Deployment completed successfully',
              context: 'Deploy to Production'
            })
